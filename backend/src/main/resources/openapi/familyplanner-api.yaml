openapi: 3.0.3
info:
  title: familyplanner API
  description: Gemeinsamer Kalender und Aufgabenplaner für Familien
  version: 0.0.1

servers:
  - url: http://localhost:8081
    description: Local development

paths:
  /actuator/health:
    get:
      summary: Health check
      operationId: health
      tags:
        - Actuator
      security: []
      responses:
        '200':
          description: Application is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

components:
  schemas:
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: UP
