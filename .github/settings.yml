repository:
  name: familyplanner
  description: Gemeinsamer Kalender und Aufgabenplaner für Familien
  private: false
  has_issues: true
  has_projects: true
  has_wiki: false
  default_branch: main

branches:
  - name: main
    protection:
      required_pull_request_reviews:
        required_approving_review_count: 1
        dismiss_stale_reviews: true
      required_status_checks:
        strict: true
        contexts:
          - backend
          - frontend
      enforce_admins: false
      restrictions: null
